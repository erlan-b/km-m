services:
  mysql:
    image: mysql:8.4
    container_name: realestate_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: realestate_demo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realestate_backend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: realestate_demo
      DB_USER: root
      DB_PASSWORD: root
    volumes:
      - .:/app
    command: sh -c "python -m alembic upgrade head && python -m uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
    container_name: realestate_admin
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - ../admin:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

volumes:
  mysql_data:
